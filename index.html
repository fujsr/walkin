<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fujairah Showroom Walk-in Tracker</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<!-- SheetJS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; margin: 0; padding: 20px; }
h1 { text-align: center; margin-bottom: 10px; }

/* 🔥 BIG DATE TIME DISPLAY */
#datetime {
  text-align: center;
  margin-bottom: 25px;
}

#day {
  font-size: 26px;
  font-weight: 600;
  color: #555;
}

#date {
  font-size: 22px;
  color: #777;
}

#time {
  font-size: 40px;
  font-weight: bold;
  color: #2c3e50;
  letter-spacing: 2px;
}

.totals { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 25px; }
.totals div { background: white; padding: 15px 20px; border-radius: 10px; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
.totals h3 { margin: 0; font-size: 14px; color: #555; }
.totals span { font-size: 20px; font-weight: bold; color: #2c3e50; }

.executives { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 3px 6px rgba(0,0,0,0.1);
}

.card h3 { margin: 0 0 10px; font-size: 14px; }

.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

.controls button {
  width: 35px;
  height: 35px;
  border: none;
  border-radius: 8px;
  background: #2980b9;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.controls button:hover { background: #1f618d; }

.count {
  font-size: 18px;
  font-weight: bold;
  min-width: 30px;
}

.export-section {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.1);
  max-width: 500px;
  margin: 30px auto;
  text-align: center;
}

.export-section input {
  padding: 8px;
  margin: 5px;
}

.export-section button {
  padding: 10px 15px;
  border: none;
  background: #2980b9;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.export-section button:hover { background: #1f618d; }

@media(max-width:500px){
  h1 { font-size: 18px; }

  #day { font-size: 20px; }
  #date { font-size: 18px; }
  #time { font-size: 28px; }
}
</style>
</head>
<body>

<h1>Fujairah Showroom Walk-in Tracker</h1>

<!-- 🔥 DATE TIME DISPLAY -->
<div id="datetime">
  <div id="day"></div>
  <div id="date"></div>
  <div id="time"></div>
</div>

<div class="totals">
  <div><h3>Daily</h3><span id="daily">0</span></div>
  <div><h3>Weekly</h3><span id="weekly">0</span></div>
  <div><h3>Monthly</h3><span id="monthly">0</span></div>
</div>

<div class="executives" id="grid"></div>

<div class="export-section">
  <h3>Export Data</h3>
  <input type="date" id="startDate"> to 
  <input type="date" id="endDate">
  <br><br>
  <button onclick="exportData()">Export Excel</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCnFfEuXiPieUC7e--k-GJg9XYKas0CeFo",
  authDomain: "walkins-1075c.firebaseapp.com",
  databaseURL: "https://walkins-1075c-default-rtdb.firebaseio.com/",
  projectId: "walkins-1075c",
  storageBucket: "walkins-1075c.firebasestorage.app",
  messagingSenderId: "120467264924",
  appId: "1:120467264924:web:1720f66ad02dacfb53e459"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const executives = ["Asmaa","Eme","Maria","Sayeed","Yehia","Richard","Junaid"];
const totals = {};
const grid = document.getElementById("grid");

/* 🔥 LIVE DATE TIME */
function updateDateTime(){
  const now = new Date();

  document.getElementById("day").innerText =
    now.toLocaleDateString('en-US', { weekday: 'long' });

  document.getElementById("date").innerText =
    now.toLocaleDateString('en-GB');

  document.getElementById("time").innerText =
    now.toLocaleTimeString();
}

setInterval(updateDateTime, 1000);
updateDateTime();

// Create UI
executives.forEach(name => {
  totals[name] = 0;

  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <h3>${name}</h3>
    <div class="controls">
      <button onclick="update('${name}', -1)">−</button>
      <span class="count" id="${name}">0</span>
      <button onclick="update('${name}', 1)">+</button>
    </div>
  `;
  grid.appendChild(div);
});

// Add / subtract
function update(name, value){
  if(value < 0 && !confirm("Reduce count?")) return;

  db.ref("walkins").push({
    executive: name,
    count: value,
    timestamp: Date.now()
  });
}

// Live update
db.ref("walkins").on("value", snap => {
  let d=0,w=0,m=0;

  executives.forEach(e => totals[e]=0);

  const now = new Date();
  const weekStart = new Date();
  weekStart.setDate(now.getDate()-now.getDay());
  weekStart.setHours(0,0,0,0);

  snap.forEach(child=>{
    const data = child.val();
    const date = new Date(data.timestamp);

    totals[data.executive]+=data.count;
    if(totals[data.executive]<0) totals[data.executive]=0;

    if(date.toDateString()===now.toDateString()) d+=data.count;
    if(date>=weekStart) w+=data.count;
    if(date.getMonth()===now.getMonth()) m+=data.count;
  });

  executives.forEach(e=>{
    document.getElementById(e).innerText = totals[e];
  });

  document.getElementById("daily").innerText = Math.max(0,d);
  document.getElementById("weekly").innerText = Math.max(0,w);
  document.getElementById("monthly").innerText = Math.max(0,m);
});

// Export Excel
function exportData(){
  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;

  if(!start || !end) return alert("Select dates");

  db.ref("walkins").once("value").then(snap=>{
    const rows=[["Executive","Count","Date","Time"]];

    snap.forEach(child=>{
      const data=child.val();
      const date=new Date(data.timestamp);
      const d=date.toISOString().split("T")[0];

      if(d>=start && d<=end){
        rows.push([
          data.executive,
          data.count,
          d,
          date.toLocaleTimeString()
        ]);
      }
    });

    const ws=XLSX.utils.aoa_to_sheet(rows);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Walkins");
    XLSX.writeFile(wb,"Walkins.xlsx");
  });
}
</script>

<footer style="
  text-align:center;
  margin-top:50px;
  padding-top:15px;
  border-top:1px solid #ddd;
  color:#888;
  font-size:13px;">
  © 2026 Hesper. All rights reserved.
</footer>

</body>
</html>
