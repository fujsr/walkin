<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fujairah Showroom Tracker</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #006666; 
            --primary-dark: #004d4d;
            --accent: #00d2d2;
            --bg: #f2f7f7;
            --card-bg: #ffffff;
            --text-main: #1a2a2a;
            --rak-text: #1a2a2a;
            --fujairah-color: #1a2a2a; 
            --shadow-soft: 0 10px 30px rgba(0, 102, 102, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.dark {
            --bg: #050a0a;
            --card-bg: #0f1a1a;
            --text-main: #e0f2f2;
            --rak-text: #ffffff;
            --primary: #00a8a8;
            --fujairah-color: #ffffff; 
        }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            margin: 0; padding: 20px; 
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header { 
            text-align: center; 
            margin-bottom: 20px; 
            position: relative; 
            padding-top: 10px;
        }
        .rak-left {
            position: absolute;
            left: 0;
            top: 10px;
            font-size: 2.4rem;
            font-weight: 800;
            color: var(--rak-text);
            letter-spacing: -1.5px;
        }
        .showroom-title { 
            font-size: 2.4rem; 
            font-weight: 800; 
            margin: 0 0 25px 0;
            color: var(--fujairah-color); 
            letter-spacing: -1.5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
            transition: color 0.3s ease;
        }
        .top-controls { position: absolute; right: 0; top: 10px; display: flex; gap: 10px; }
        .btn-tool {
            width: 36px; height: 36px; border-radius: 12px; border: none;
            background: var(--card-bg); cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow-soft); transition: var(--transition);
            color: var(--primary); font-size: 1.1rem;
        }
        #datetime { text-align: center; margin-bottom: 20px; }
        #time { font-size: 3.5rem; font-weight: 800; color: var(--primary); margin: 0; letter-spacing: -1px; }
        #date-info { font-size: 1.2rem; opacity: 0.8; font-weight: 500; }
        .peak-container { display: flex; justify-content: center; margin-bottom: 20px; }
        .peak-card {
            background: var(--card-bg);
            padding: 15px 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            border-left: 5px solid var(--accent);
            text-align: center;
        }
        .peak-card h4 { margin: 0; font-size: 0.8rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px; }
        .peak-card div { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .totals { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { 
            background: var(--card-bg); padding: 25px; border-radius: 28px; text-align: center; 
            box-shadow: var(--shadow-soft); border-bottom: 6px solid var(--primary);
        }
        .stat-card h3 { margin: 0 0 5px 0; font-size: 0.9rem; text-transform: uppercase; opacity: 0.6; font-weight: 600; }
        .stat-card span { font-size: 2.5rem; font-weight: 900; color: var(--primary); }
        .executives { 
            display: grid; grid-template-columns: repeat(7, 1fr); 
            gap: 15px; margin-bottom: 40px; width: 100%;
        }
        .card {
            background: var(--card-bg); padding: 20px 10px; border-radius: 26px;
            box-shadow: var(--shadow-soft); border: 1px solid rgba(0,0,0,0.02);
            text-align: center;
        }
        .card h3 { margin: 0 0 15px 0; font-size: 1.1rem; font-weight: 800; }
        .controls { 
            display: flex; align-items: center; justify-content: space-around;
            background: rgba(0, 102, 102, 0.05); padding: 8px; border-radius: 50px; 
        }
        .controls button { 
            width: 38px; height: 38px; border: none; border-radius: 50%; 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; cursor: pointer; font-size: 1.4rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0, 102, 102, 0.3);
        }
        .count { font-size: 1.6rem; font-weight: 900; color: var(--primary); min-width: 35px; }
        .chart-wrapper { background: var(--card-bg); padding: 35px; border-radius: 35px; box-shadow: var(--shadow-soft); margin-bottom: 40px; height: 450px; }
        .footer-export {
            text-align: center; padding: 45px; background: var(--card-bg); 
            border-radius: 35px; box-shadow: var(--shadow-soft);
        }
        #adminPanel {
            position: fixed; right: -400px; top: 0; width: 340px; height: 100%;
            background: var(--card-bg); box-shadow: -20px 0 50px rgba(0,0,0,0.15);
            transition: 0.5s ease; z-index: 1000; padding: 40px;
        }
        #adminPanel.active { right: 0; }
        .locked { opacity: 0.2; filter: grayscale(1); pointer-events: none; }
        .locked-tag { color: #ff4757; font-size: 0.7rem; font-weight: 800; display: block; margin-top: 6px; }
        @media (max-width: 1300px) { .executives { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 768px) {
            .rak-left { position: relative; text-align: center; width: 100%; margin-bottom: 5px; }
            .top-controls { top: 60px; right: 10px; }
            .totals { grid-template-columns: 1fr; max-width: 100%; }
            .executives { grid-template-columns: 1fr 1fr; }
            #time { font-size: 4rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="rak-left">RAK</div>
        <div class="top-controls">
            <button class="btn-tool" onclick="toggleFullScreen()" title="Fullscreen">⛶</button>
            <button class="btn-tool" onclick="toggleDark()" title="Theme">🌓</button>
            <button class="btn-tool" onclick="openAdmin()" title="Settings">⚙️</button>
        </div>
        <h2 class="showroom-title">Fujairah Showroom</h2>
        <div id="datetime">
            <h1 id="time">00:00:00</h1>
            <div id="date-info"><span id="day"></span>, <span id="date"></span></div>
        </div>
    </header>

    <div class="peak-container">
        <div class="peak-card">
            <h4>Peak Hour (Last 30 Days)</h4>
            <div id="peak-hour-val">Calculating...</div>
        </div>
    </div>

    <div class="totals">
        <div class="stat-card"><h3>Daily Footfall</h3><span id="daily">0</span></div>
        <div class="stat-card"><h3>Weekly Total</h3><span id="weekly">0</span></div>
        <div class="stat-card"><h3>Monthly Total</h3><span id="monthly">0</span></div>
    </div>

    <div class="executives" id="grid"></div>

    <div class="chart-wrapper">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h3 style="margin:0; font-weight: 900; font-size: 1.4rem;">Footfall Analysis</h3>
            <select id="viewSelector" onchange="renderChart()" style="padding: 12px 20px; border-radius: 15px; border: 1px solid rgba(0,0,0,0.05); font-weight: 600; cursor: pointer; outline: none; background: var(--card-bg); color: var(--text-main);">
                <option value="line">Monthly Activity</option>
                <option value="bar">Day Analysis</option>
            </select>
        </div>
        <canvas id="walkinChart"></canvas>
    </div>

    <div class="footer-export">
        <div style="margin-bottom: 20px; opacity: 0.5; font-weight: 700; text-transform: uppercase; font-size: 0.8rem;">Data Management</div>
        <input type="date" id="startDate" style="padding:14px; border-radius: 12px; border: 1px solid #ddd; background: var(--card-bg); color: var(--text-main);"> 
        <span style="font-weight: 900; color: var(--primary); margin: 0 15px;">TO</span>
        <input type="date" id="endDate" style="padding:14px; border-radius: 12px; border: 1px solid #ddd; background: var(--card-bg); color: var(--text-main);">
        <button onclick="exportData()" style="margin-left: 25px; padding: 15px 40px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: 800; cursor: pointer;">EXPORT EXCEL</button>
    </div>
</div>

<div id="adminPanel">
    <h2 style="font-weight: 900; margin-top: 0;">Admin Tools</h2>
    <div id="lockList"></div>
    <button onclick="closeAdmin()" style="width:100%; padding:18px; margin-top:30px; border:none; border-radius:18px; background: var(--text-main); color: var(--card-bg); font-weight: 800; cursor: pointer;">SAVE CHANGES</button>
</div>

<script>
// IMPORTANT: Paste your real API Key here if it is not already there
const firebaseConfig = {
    apiKey: "AIzaSy...", 
    authDomain: "walkins-1075c.firebaseapp.com",
    databaseURL: "https://walkins-1075c-default-rtdb.firebaseio.com/",
    projectId: "walkins-1075c"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const executives = ["Asmaa","Eme","Maria","Sayeed","Yehia","Richard","Junaid"];
const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
let lockedUsers = {};
let walkinChart;
let historyData = [];

// UPDATED SHOWROOM COORDINATES (Opposite Grand Sheikh Zayed Mosque)
const showroomLat = 25.132047; 
const showroomLon = 56.321035; 
const allowedRadiusKM = 0.5; // 500 Meters

executives.forEach(name => {
    const div = document.createElement("div");
    div.className = "card"; div.id = `card-${name}`;
    div.innerHTML = `<h3 id="label-${name}">${name}</h3>
        <div class="controls">
            <button onclick="update('${name}', -1)">−</button>
            <span class="count" id="${name}">0</span>
            <button onclick="update('${name}', 1)">+</button>
        </div>`;
    document.getElementById("grid").appendChild(div);
});

function updateDateTime(){
    const now = new Date();
    document.getElementById('day').innerText = now.toLocaleDateString('en-US', { weekday: 'long' });
    document.getElementById('date').innerText = now.toLocaleDateString('en-GB');
    document.getElementById('time').innerText = now.toLocaleTimeString([], { hour12: false });
}
setInterval(updateDateTime, 1000);

// GEOPOLITICAL RESTRICTION LOGIC
function update(name, val) { 
    if(lockedUsers[name]) return;

    if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition((position) => {
            const userLat = position.coords.latitude;
            const userLon = position.coords.longitude;
            const distance = calculateDistance(userLat, userLon, showroomLat, showroomLon);

            if (distance <= allowedRadiusKM) {
                db.ref("walkins").push({ executive: name, count: val, timestamp: Date.now() }); 
            } else {
                alert(`ACCESS DENIED: You are currently ${distance.toFixed(2)}km away. Updates are only allowed at the Fujairah Showroom.`);
            }
        }, (error) => {
            alert("LOCATION REQUIRED: Please enable GPS/Location access to update counts.");
        }, { enableHighAccuracy: true });
    } else {
        alert("Geolocation is not supported by this browser.");
    }
}

function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371; // Earth radius in KM
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

function calculatePeakHour(data) {
    const thirtyDaysAgo = Date.now() - (30 * 24 * 60 * 60 * 1000);
    const hourCounts = Array(24).fill(0);
    data.forEach(entry => {
        if (entry.timestamp > thirtyDaysAgo && entry.count > 0) {
            const hour = new Date(entry.timestamp).getHours();
            hourCounts[hour] += entry.count;
        }
    });
    let maxHour = 0, maxVal = 0;
    hourCounts.forEach((count, hr) => {
        if (count > maxVal) { maxVal = count; maxHour = hr; }
    });
    if (maxVal === 0) return "No Data";
    return `${maxHour.toString().padStart(2, '0')}:00 - ${(maxHour + 1).toString().padStart(2, '0')}:00`;
}

db.ref("walkins").on("value", snap => {
    historyData = [];
    let d=0, w=0, m=0;
    const monthlyCounts = {};
    executives.forEach(e => monthlyCounts[e] = 0);
    const now = new Date();
    const startOfWeek = new Date(now);
    startOfWeek.setDate(now.getDate() - now.getDay());

    snap.forEach(child => {
        const val = child.val();
        historyData.push(val);
        const date = new Date(val.timestamp);
        if(date.toDateString() === now.toDateString()) d += val.count;
        if(date >= startOfWeek) w += val.count;
        if(date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear()) {
            m += val.count;
            monthlyCounts[val.executive] += val.count;
        }
    });

    executives.forEach(e => {
        const el = document.getElementById(e);
        if(el) el.innerText = monthlyCounts[e] || 0;
    });
    document.getElementById("daily").innerText = d;
    document.getElementById("weekly").innerText = w;
    document.getElementById("monthly").innerText = m;
    document.getElementById("peak-hour-val").innerText = calculatePeakHour(historyData);
    renderChart();
});

function renderChart() {
    const type = document.getElementById("viewSelector").value;
    const primary = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
    const isDark = document.body.classList.contains('dark');
    const now = new Date();
    let labels = [], data = [];

    if(type === 'line') {
        const days = now.getDate();
        labels = Array.from({length: days}, (_, i) => i + 1);
        const dailyMap = {};
        historyData.forEach(h => {
            const dt = new Date(h.timestamp);
            if(dt.getMonth() === now.getMonth()) dailyMap[dt.getDate()] = (dailyMap[dt.getDate()] || 0) + h.count;
        });
        data = labels.map(day => dailyMap[day] || 0);
    } else {
        labels = dayNames;
        const weekMap = [0,0,0,0,0,0,0];
        historyData.forEach(h => weekMap[new Date(h.timestamp).getDay()] += h.count);
        data = weekMap;
    }

    if (walkinChart) walkinChart.destroy();
    walkinChart = new Chart(document.getElementById('walkinChart'), {
        type: type === 'line' ? 'line' : 'bar',
        data: {
            labels: labels,
            datasets: [{ 
                label: 'Visitors', data: data, 
                borderColor: primary, backgroundColor: type === 'line' ? 'rgba(0,168,168,0.1)' : primary,
                fill: true, tension: 0.4, borderRadius: 15
            }]
        },
        options: { 
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { 
                y: { beginAtZero: true, grid: { color: isDark ? '#1a2b2b' : '#f0f0f0' } },
                x: { grid: { display: false } }
            }
        }
    });
}

db.ref("locks").on("value", snap => {
    const data = snap.val() || {};
    executives.forEach(name => {
        lockedUsers[name] = data[name] || false;
        const card = document.getElementById(`card-${name}`);
        const label = document.getElementById(`label-${name}`);
        if(card && label) {
            card.classList.toggle("locked", lockedUsers[name]);
            label.innerHTML = lockedUsers[name] ? `${name} <span class="locked-tag">OFF DUTY</span>` : name;
        }
    });
});

function toggleDark(){ document.body.classList.toggle("dark"); setTimeout(renderChart, 100); }
function toggleFullScreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

function openAdmin() { if(prompt("PIN:") === "7255") { renderAdmin(); document.getElementById("adminPanel").classList.add("active"); } }
function closeAdmin() { document.getElementById("adminPanel").classList.remove("active"); }
function renderAdmin() {
    const list = document.getElementById("lockList"); list.innerHTML = "";
    executives.forEach(name => {
        const locked = lockedUsers[name] || false;
        list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:12px; background:rgba(0,0,0,0.05); padding:12px; border-radius:15px; align-items:center;">
            <span style="font-weight:700;">${name}</span>
            <button onclick="toggleLock('${name}')" style="background:${locked?'#ff4757':'#006666'}; color:white; border:none; padding:8px 20px; border-radius:10px; cursor:pointer; font-weight:700;">
            ${locked?'LOCKED':'ACTIVE'}</button></div>`;
    });
}
function toggleLock(name) { db.ref("locks/"+name).set(!lockedUsers[name]).then(renderAdmin); }

function exportData(){
    const start = document.getElementById("startDate").value, end = document.getElementById("endDate").value;
    if(!start || !end) return alert("Select dates");
    const rows = [["Executive", "Count", "Date", "Time"]];
    historyData.forEach(d => {
        const dt = new Date(d.timestamp);
        const dStr = dt.toISOString().split("T")[0];
        const tStr = dt.toLocaleTimeString('en-GB', { hour12: false });
        if(dStr >= start && dStr <= end) rows.push([d.executive, d.count, dStr, tStr]);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows), wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Walkins"); XLSX.writeFile(wb, "Showroom_Report.xlsx");
}
</script>
<footer style="text-align:center;margin-top:50px;padding-top:15px;border-top:1px solid #ddd;color:#888;font-size:13px;">  © 2026 Hesper. All rights reserved.</footer>
</body>
</html>
