<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Showroom Walk-in Tracker</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<!-- SheetJS for Excel export -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; color: #333; margin: 0; padding: 20px; }
h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }

.totals { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 30px; }
.totals div { background: #fff; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; min-width: 120px; }
.totals div h2 { margin: 0 0 10px; color: #2980b9; font-size: 1em; }
.totals div span { font-size: 1.4em; font-weight: bold; }

.executives { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 40px; }
.executive-card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); text-align: center; width: 140px; flex-shrink: 0; }
.executive-card h3 { margin: 0 0 10px; color: #34495e; font-size: 1em; }
.executive-card span { font-size: 1.4em; font-weight: bold; color: #27ae60; }

.add-walkin, .export-section { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto 20px; text-align: center; }
.add-walkin select, .add-walkin input, .export-section input { padding: 10px; margin: 10px 5px; border-radius: 8px; border: 1px solid #ccc; width: 120px; }
.add-walkin button, .export-section button { padding: 10px 20px; border: none; border-radius: 8px; background: #2980b9; color: white; cursor: pointer; font-size: 1em; }
.add-walkin button:hover, .export-section button:hover { background: #1f618d; }

@media (max-width: 500px) {
  .executive-card { width: 45%; }
  .totals { gap: 10px; }
}
</style>
</head>
<body>

<h1>Showroom Walk-in Tracker</h1>

<div class="totals">
  <div><h2>Daily</h2><span id="totalToday">0</span></div>
  <div><h2>Weekly</h2><span id="totalWeek">0</span></div>
  <div><h2>Monthly</h2><span id="totalMonth">0</span></div>
</div>

<div class="executives" id="executivesGrid"></div>

<div class="add-walkin">
  <h3>Add Walk-ins</h3>
  <select id="executiveSelect"></select>
  <input type="number" id="walkinCount" placeholder="Number" min="1">
  <button onclick="addWalkin()">Add</button>
</div>

<div class="export-section">
  <h3>Export Data</h3>
  <input type="date" id="startDate"> to <input type="date" id="endDate">
  <button onclick="exportData()">Export Excel</button>
</div>

<script>
  // ===== Firebase Config =====
  const firebaseConfig = {
    apiKey: "AIzaSyCnFfEuXiPieUC7e--k-GJg9XYKas0CeFo",
    authDomain: "walkins-1075c.firebaseapp.com",
    databaseURL: "https://walkins-1075c-default-rtdb.firebaseio.com/",
    projectId: "walkins-1075c",
    storageBucket: "walkins-1075c.firebasestorage.app",
    messagingSenderId: "120467264924",
    appId: "1:120467264924:web:1720f66ad02dacfb53e459"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const executives = ["Asmaa","Eme","Maria","Sayeed","Yehia","Richard","Junaid"];
  const execTotals = {};

  const grid = document.getElementById('executivesGrid');
  const dropdown = document.getElementById('executiveSelect');

  // Initialize cards & dropdown
  executives.forEach(exec => {
    execTotals[exec] = 0;

    // Card
    const card = document.createElement('div');
    card.className = 'executive-card';
    card.id = `card-${exec}`;
    card.innerHTML = `<h3>${exec}</h3><span id="count-${exec}">0</span>`;
    grid.appendChild(card);

    // Dropdown
    const option = document.createElement('option');
    option.value = exec;
    option.textContent = exec;
    dropdown.appendChild(option);
  });

  function formatDate(date){ return date.toISOString().split('T')[0]; }

  function addWalkin(){
    const exec = dropdown.value;
    const count = parseInt(document.getElementById('walkinCount').value);
    if(!count || count <= 0) return alert("Enter a valid number");
    const timestamp = Date.now();
    db.ref('walkins').push({ executive: exec, count, timestamp });
    document.getElementById('walkinCount').value = '';
  }

  function updateTotals(snapshot){
    let totalToday=0, totalWeek=0, totalMonth=0;
    executives.forEach(exec => execTotals[exec] = 0);

    const now = new Date();
    const startOfWeek = new Date(now); startOfWeek.setDate(now.getDate() - now.getDay());

    snapshot.forEach(child=>{
      const data = child.val();
      const date = new Date(data.timestamp);

      execTotals[data.executive] += data.count;

      if(formatDate(date) === formatDate(now)) totalToday += data.count;
      if(date >= startOfWeek) totalWeek += data.count;
      if(date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear()) totalMonth += data.count;
    });

    executives.forEach(exec => document.getElementById(`count-${exec}`).textContent = execTotals[exec]);
    document.getElementById('totalToday').textContent = totalToday;
    document.getElementById('totalWeek').textContent = totalWeek;
    document.getElementById('totalMonth').textContent = totalMonth;
  }

  db.ref('walkins').on('value', updateTotals);

  function exportData(){
    const startDate = document.getElementById('startDate').value;
    const endDate = document.getElementById('endDate').value;
    if(!startDate || !endDate) return alert("Select both dates");

    db.ref('walkins').once('value').then(snapshot=>{
      const rows = [["Executive","Count","Date","Time"]];
      snapshot.forEach(child=>{
        const data = child.val();
        const date = new Date(data.timestamp);
        const dateStr = date.toISOString().split("T")[0];
        if(dateStr >= startDate && dateStr <= endDate){
          const timeStr = date.toLocaleTimeString();
          rows.push([data.executive, data.count, dateStr, timeStr]);
        }
      });
      const ws = XLSX.utils.aoa_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Walkins");
      XLSX.writeFile(wb, "Walkins.xlsx");
    });
  }
</script>

</body>
</html>
